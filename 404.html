
      <html>
        <head>
          <title>Loading... | Portfolio | John Hudson</title>
          <meta name="description" content="Welcome to my portfolio"/>
          <meta name="keywords" content="John Hudson, Software engineer, for hire, looking for work"/>
          <!-- Caching is handled by the app instead !-->
          <meta http-equiv="Cache-Control" content="no-cache">
          <meta name="viewport" content="initial-scale=1.0,width=device-width"/>
        </head>
        <body>
          <div id="root"></div>

          <script>
            const isGithubPages = location.hostname.endsWith("github.io");
            const repo = location.pathname.split("/")[1];
            const BASE = isGithubPages ? "/" + repo : "";

            window.__CACHE_KEY__ = "mmgrzsteogteyp";

            const css = document.createElement("link");
            css.rel = "stylesheet";
            css.href = BASE + "/build/app.css?cache=" + window.__CACHE_KEY__;
            document.head.appendChild(css);

            const js = document.createElement("script");
            js.type = "module";
            js.src = BASE + "/build/app.js?cache=" + window.__CACHE_KEY__;
            document.body.appendChild(js);
          </script>
        </body>
      </html>
